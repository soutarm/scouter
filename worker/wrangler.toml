name = "scouter-reviews"
main = "index.ts"
compatibility_date = "2024-09-23"

[[kv_namespaces]]
binding = "REVIEWS"
id = "623fdd03a0c54fcaa1bab2712c91c097"
preview_id = "623fdd03a0c54fcaa1bab2712c91c097"

[vars]
ALLOWED_ORIGIN = "https://scouter.mrated.dev,https://scouter-1ah.pages.dev"

# Secret required: GEMINI_API_KEY
# Set via: npx wrangler secret put GEMINI_API_KEY
# Used by the weekly cron to refresh property benchmark data via Gemini.

# Secret required: OPENROUTER_API_KEY
# Set via: npx wrangler secret put OPENROUTER_API_KEY
# Used by POST /llm/free to serve zero-config reviews via OpenRouter's free tier.
# If unset, the endpoint returns 503 and the app falls back to requiring a
# user-supplied provider key.

[[triggers.crons]]
cron = "0 2 * * 1"  # Every Monday at 02:00 UTC

[dev]
port = 8787
